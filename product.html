<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WB Simple - Карточка товара</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__container">
                <div class="header__top">
                    <ul class="simple-menu">
                        <li class="simple-menu__item"><span class="simple-menu__link">Москва</span></li>
                        <li class="simple-menu__item"><a href="#" class="simple-menu__link">Работа в WB</a></li>
                        <li class="simple-menu__item"><span class="simple-menu__link">RUB</span></li>
                    </ul>
                    <!-- Кнопка Домой в хедере -->
                    <div class="header__balance-block">
                        <a href="index.html" id="home-link" style="text-decoration: none; color: #000;">🏠 Домой</a>
                    </div>
                </div>
                <div class="header__bottom">
                    <div class="nav-element">
                        <a href="index.html" class="logo">
                            <svg width="150" height="38" viewBox="0 0 216 58" fill="#000">

                            </svg>
                        </a>
                        <button class="burger" type="button">☰</button>
                    </div>
                    <div class="search-catalog">
                        <input class="search-catalog__input" type="search" placeholder="Найти на Wildberries">
                        <button class="search-catalog__btn" type="button">🔍</button>
                    </div>
                    <div class="navbar-pc">
                        <a href="#" class="navbar-pc__link"><span class="navbar-pc__icon">📍</span><p>Заказы</p></a>
                        <a href="#" class="navbar-pc__link"><span class="navbar-pc__icon">❤️</span><p>Избранное</p></a>
                        <a href="#" class="navbar-pc__link"><span class="navbar-pc__icon">👤</span><p>Профиль</p></a>
                        <a href="#" class="navbar-pc__link"><span class="navbar-pc__icon">🛒</span><p>Корзина</p></a>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="main__container">
                <a href="index.html" class="back-link" id="back-link">← На главную</a>
                <div class="product-page" id="product-page">
                    <!-- Сюда будет вставлена информация о товаре через JS -->
                    <div class="product-page__gallery">
                        <img id="product-img" src="" alt="Товар">
                    </div>
                    <div class="product-page__info">
                        <h1 id="product-title" class="product-page__title"></h1>
                        <div id="product-rating" class="product-page__rating"></div>
                        <div class="product-page__price price">
                            <span class="price__first-row">
                                <ins id="product-price" class="price__lower-price"></ins>
                                <del id="product-old-price"></del>
                                <span id="product-sale" class="percentage-sale"></span>
                            </span>
                        </div>
                        <button class="product-page__add-to-cart">Добавить в корзину</button>
                        <p id="product-description" class="product-page__description"></p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer__container">
                <div class="footer__add-info">
                    <p class="footer__copyrights">© 2026 WB Копия.</p>
                </div>
            </div>
        </footer>
    </div>
    <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
