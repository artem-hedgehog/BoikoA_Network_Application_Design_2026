<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЛР5: AJAX + API | Карточки товаров</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Основные стили проекта -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <!-- Сюда динамически вставляется хедер (HeaderComponent) -->
        <div id="header"></div>

        <!-- Основной контент – сюда рендерятся страницы (MainPage, ProductPage, CreatePage) -->
        <main class="main">
            <div class="container mt-3" id="root"></div>
        </main>

        <!-- Контейнер для всплывающих уведомлений (Bootstrap Toasts) -->
        <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100"></div>
    </div>

    <!-- Bootstrap JS (необходим для тостов и интерактивных компонентов) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Основной модуль (точка входа) -->
    <script src="main.js" type="module"></script>
</body>
</html>
